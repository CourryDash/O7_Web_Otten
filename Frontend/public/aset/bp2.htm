 menonjol adalah kapasitas untuk menyimpan beberapa resep seduh di dalam aplikasi. Ini memudahkan Anda untuk menyeduh kopi sesuai dengan preferensi rasa yang berbeda setiap saat. Selain itu, Hikaru mudah dibersihkan, dengan komponen yang dapat dilepas dan dicuci setelah digunakan.\u003c/h4\u003e\u003ch4 style=\"text-align: justify;\"\u003eDengan teknologi terintegrasi dan kontrol yang canggih, Hiroia Hikaru V60 Smart Brewer menawarkan pengalaman manual brewing yang lebih maju. Anda bisa menikmati hasil seduhan berkualitas dengan presisi tinggi, baik untuk secangkir kopi harian atau saat ingin bereksperimen dengan profil rasa baru.​\u003cbr/\u003e\u003c/h4\u003e","metaTitle":"Hiroia - Hikaru V60 Smart Brewer (Powered by Hario)","metaDescription":"Dapatkan Hiroia - Hikaru V60 Smart Brewer (Powered by Hario) Terbaik hanya di Otten Coffee. Gratis Ongkir, Original \u0026 Bergaransi.","defaultVariantId":14323,"mustExpressCheckout":false,"isInWishlist":false,"isComingSoon":false,"isPriceRequestable":false,"isPreorder":false,"isProductPack":false,"images":[],"additionalLogo":null,"farmerProfile":null,"coffeeFilters":[],"videos":[],"variants":[{"id":14323,"productVariantId":null,"mustChooseOption":false,"enabled":null,"isQuantityManaged":true,"isUpselling":null,"name":"Hiroia - Hikaru V60 Smart Brewer - White (Powered by Hario)","slug":null,"formatted":{"basePrice":"Rp 13.950.000","discountedPrice":"Rp 9.950.000","point":"99.500","totalPoint":"99.500","lowestInstallmentPrice":"Rp 850.725"},"attributesName":"","minimumOrder":1,"maximumOrder":13,"quantity":13,"quantityPercent":null,"basePrice":13950000,"discountedPrice":9950000,"discountPercent":29,"point":99500,"totalPoint":99500,"discountLabel":"Hemat 4 Juta","isDiscountLabel":false,"images":[{"originalUrl":"https://d8g5mz6srwlcs.cloudfront.net/original/673dad2773f34027876744.jpg","thumbnailUrl":"https://d8g5mz6srwlcs.cloudfront.net/thumbnail/673dad2773f34027876744.jpg","miniThumbnailUrl":"https://d8g5mz6srwlcs.cloudfront.ne
